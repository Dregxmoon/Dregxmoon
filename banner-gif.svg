<svg viewBox="0 0 1000 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="1000" height="230" rx="0"/>
    </clipPath>

    <linearGradient id="darkOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#0d0d0d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0.65"/>
    </linearGradient>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-weight: 800; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-weight: 600; }
    </style>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- GIF de fondo: CAMBIAR AQUÍ la URL -->
    <image href="https://media1.tenor.com/m/fefVWhRVkgwAAAAd/anko-uguisu-kyouko-mejiro.gif" x="0" y="0" width="1000" height="230" preserveAspectRatio="xMidYMid slice"/>

    <!-- capa oscura encima del gif para que el texto se lea bien -->
    <rect x="0" y="0" width="1000" height="230" fill="url(#darkOverlay)"/>
  </g>

  <!-- texto -->
  <text x="500" y="105" text-anchor="middle" class="title" font-size="48" fill="#FF2E63" filter="url(#textGlow)">静 LUKA TORRES 静</text>
  <text x="500" y="145" text-anchor="middle" class="subtitle" font-size="19" fill="#00E5FF" letter-spacing="0.5">Backend Developer ・ Systems Engineering Student</text>
</svg>
